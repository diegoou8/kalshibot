version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile-ingest
    container_name: kalshi-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - ENV_EXECUTION_MODE=PAPER
      - TZ=America/Chicago
      - TRADE_CYCLE_INTERVAL_SECS=300
    volumes:
      - ./data:/app/data          # halt.flag + ML model artifacts (no SQLite)
      - ./Credentials:/app/Credentials:ro
    command: ["python", "bot_runner.py"]
